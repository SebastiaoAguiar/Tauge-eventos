<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tuagê Eventos | Espaço para Casamentos, Festas de 15 Anos e Eventos Corporativos</title>
    <meta
      name="description"
      content="Tuagê Eventos — espaço exclusivo para casamentos, festas de 15 anos, eventos corporativos e locação, com buffet completo e atendimento de alto padrão. Agende sua visita pelo WhatsApp."
    />
    <meta name="keywords" content="espaço para eventos, casamentos, festa de 15 anos, buffet, eventos corporativos, locação de espaço, Tuagê Eventos" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Tuagê Eventos" />
    <link rel="canonical" href="https://www.tuageeventos.com.br/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tuagê Eventos" />
    <meta property="og:title" content="Tuagê Eventos | Onde histórias inesquecíveis acontecem" />
    <meta
      property="og:description"
      content="Espaço exclusivo para casamentos, festas de 15 anos, eventos corporativos e locação. Sofisticação, estrutura completa e atendimento de alto padrão."
    />
    <meta property="og:image" content="/og-cover.jpg" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://www.tuageeventos.com.br/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tuagê Eventos | Onde histórias inesquecíveis acontecem" />
    <meta
      name="twitter:description"
      content="Espaço exclusivo para casamentos, festas de 15 anos, eventos corporativos e locação de alto padrão."
    />
    <meta name="twitter:image" content="/og-cover.jpg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EventVenue",
        "name": "Tuagê Eventos",
        "description": "Espaço exclusivo para casamentos, festas de 15 anos, eventos corporativos, buffet e locação de espaço para eventos de alto padrão.",
        "image": "/og-cover.jpg",
        "priceRange": "$$$",
        "telephone": "+55-63-99999-9999",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Palmas",
          "addressRegion": "TO",
          "addressCountry": "BR"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
